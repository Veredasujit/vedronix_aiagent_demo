services:
  agent:
    build: .
    env_file: .env
    ports:
      - "${HOST_PORT:-8010}:8010"
    volumes:
      - ./recordings:/app/recordings
    restart: on-failure:3
    # ✅ Healthcheck (TEST endpoint)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/"]
      interval: 30s
      timeout: 10s
      retries: 3